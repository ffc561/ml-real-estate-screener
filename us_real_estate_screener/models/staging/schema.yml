version: 2

models:
  - name: latest_zillow_listings
    description: "Latest listing record for each ZPID from the search results."
    columns:
      - name: zpid
        data_tests:
          - not_null
          - unique

  - name: dim_properties
    description: "Static structural dimensions of real estate properties."
    columns:
      - name: property_zillow_id
        data_tests:
          - not_null
          - unique
      - name: year_built
        description: "The year the property was built."
      - name: living_area_sqft
        description: "The total living area in square feet."

  - name: fct_property_valuations
    description: "Current market status, pricing, and popularity metrics for properties."
    columns:
      - name: property_zillow_id
        data_tests:
          - not_null
          - unique
      - name: current_price
        data_tests:
          - not_null:
              config:
                severity: warn

  - name: fct_property_financials
    description: "Current financial obligations and tax data for properties."
    columns:
      - name: property_zillow_id
        data_tests:
          - not_null
          - unique

  - name: zillow_property_comp_details
    description: "Parsed comparable sales data for properties, linking target ZPIDs to their comparable ZPIDs."
    columns:
      - name: target_property_zpid
        data_tests:
          - not_null
      - name: comp_zpid
        data_tests:
          - not_null

  - name: zillow_monthly_metrics
    description: "Monthly real estate inventory and pricing metrics aggregated by zip code."
    columns:
      - name: month_date
        data_tests:
          - not_null
      - name: postal_code
        data_tests:
          - not_null
